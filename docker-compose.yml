version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: ai-interview-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - redis_data:/data
    networks:
      - ai-interview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: ai-interview-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-interview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-fastapi
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ai-interview-network
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
  postgres_data:

networks:
  ai-interview-network:
    driver: bridge
